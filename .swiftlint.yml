# SwiftLint Configuration for Patch App

# Paths to include
included:
  - Patch

# Paths to exclude
excluded:
  - Patch/Resources
  - PatchTests
  - PatchUITests
  - .build
  - DerivedData

# Enabled rules
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - line_length

# Rule configurations
identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 8
  error: 10

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 6

vertical_whitespace:
  max_empty_lines: 2

trailing_comma:
  mandatory_comma: true

force_cast:
  severity: warning

force_try:
  severity: warning

# Custom rules
custom_rules:
  no_print_in_production:
    name: "No print statements"
    regex: "print\\s*\\("
    message: "Use os_log or a proper logging framework instead of print"
    severity: warning
