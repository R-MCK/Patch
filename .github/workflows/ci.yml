name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, Lint, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared packages
        run: npm run packages:check

      - name: Typecheck backend
        run: npm --workspace backend exec tsc -- --noEmit --pretty false

      - name: Typecheck mobile
        run: npm --workspace mobile run typecheck

      - name: Lint web
        run: npm --workspace web run lint

      - name: Build web
        run: npm --workspace web run build
